name: Promote Test to Production
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm promotion to production'
        required: true
jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    steps:
      - name: Promote test to production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rsync -av --delete \
              --exclude='.github' \
              --exclude='.git' \
              /var/www/personal-website/apps/test.dominickzou.dev/public_html/ \
              /var/www/personal-website/apps/dominickzou.dev/public_html/
