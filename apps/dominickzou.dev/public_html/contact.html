<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <div id="page-content" class="subpage page-contact">

            <div class="nav-inner">
                <a href="/">Dominick Zou</a>
                <div class="nav-links">
                    <a href="work.html">Work</a>
                    <a href="about.html">About</a>
                    <a href="contact.html" class="active">Contact</a>
                </div>
            </div>

        <main>
            <div class="contact-form">
                <h1>Initiate <br> transmission.</h1>

                <form onsubmit="event.preventDefault(); alert('Transmission sequence confirmed.');">
                    <div class="form-group">
                        <input type="text" placeholder="Identity Node" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Return Vector (Email)" required>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Payload Data" rows="1" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Transmit Data</button>
                </form>
            </div>
        </main>
    </div>

    <script src="assets/bg_particles.js"></script>
