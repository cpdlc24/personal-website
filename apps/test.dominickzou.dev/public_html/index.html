<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominick Zou</title>
    <meta name="description" content="Software Engineer — Building scalable systems.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://collector.dominickzou.dev/collector.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        #fluid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            padding: 2rem 3rem;
            pointer-events: none;
        }
        nav .nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
        }
        nav a {
            color: #111;
            text-decoration: none;
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }
        nav a:hover { opacity: 0.5; }
        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { opacity: 0.5; }
        .nav-links a:hover { opacity: 1; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
            padding: 2rem;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 500;
            letter-spacing: -0.03em;
            line-height: 1.05;
            text-align: center;
            color: transparent;
            user-select: none;
        }

        .cta-row {
            display: flex;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .cta-row a {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 600;
            color: #111;
            text-decoration: none;
            padding-bottom: 2px;
            border-bottom: 1.5px solid transparent;
            transition: border-color 0.3s ease, opacity 0.3s ease;
            pointer-events: auto;
        }
        .cta-row a:hover {
            border-bottom-color: #111;
        }

        .footer-anchor {
            position: fixed;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            z-index: 50;
            pointer-events: none;
        }
        .footer-anchor a {
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            color: #111;
            opacity: 0.2;
            text-decoration: none;
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }
        .footer-anchor a:hover { opacity: 0.8; }

        @media (max-width: 640px) {
            nav { padding: 1.5rem; }
            .nav-links { gap: 1.2rem; }
            .cta-row { gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <canvas id="fluid"></canvas>

    <nav>
        <div class="nav-inner">
            <a href="/">Dominick Zou</a>
            <div class="nav-links">
                <a href="work.html">Work</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <h1>Dominick Zou</h1>
        <div class="cta-row">
            <a href="work.html">View Work</a>
            <a href="about.html">About Me</a>
        </div>
    </main>

    <div class="footer-anchor">
        <a href="https://reporting.dominickzou.dev">Analytics</a>
    </div>

    <script src="smoke.js"></script>
</body>
</html>
