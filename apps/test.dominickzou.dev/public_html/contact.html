<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Dominick Zou</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://collector.dominickzou.dev/collector.js"></script>
</head>
<body class="bg-white text-gray-900 font-sans antialiased selection:bg-gray-200">
    


    <nav class="fixed top-0 w-full z-50 p-8 sm:p-12 text-gray-900">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-6 text-xs tracking-widest uppercase font-medium">
            <a href="/" class="hover:opacity-60 transition-opacity">Dominick Zou</a>
            <div class="flex gap-8">
                <a href="work.html" class="opacity-50 hover:opacity-100 transition-opacity">Work</a>
                <a href="about.html" class="opacity-50 hover:opacity-100 transition-opacity">About</a>
                <a href="contact.html" class="opacity-100 font-semibold cursor-default border-b border-gray-900 pb-1">Contact</a>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-32 p-8 sm:p-12 lg:p-24 flex items-center text-gray-900 relative z-10 pointer-events-none">
        <div class="max-w-xl pointer-events-auto w-full">
            <h1 class="text-4xl sm:text-6xl font-medium tracking-tight mb-16 leading-tight">
                Initiate <br/> transmission.
            </h1>
            
            <form onsubmit="event.preventDefault(); alert('Transmission sequence confirmed.');" class="space-y-12">
                <div>
                    <input type="text" placeholder="Identity Node" required class="w-full bg-transparent border-b border-gray-200 py-4 text-xl focus:outline-none focus:border-gray-900 transition-colors placeholder-gray-300 text-gray-900 rounded-none">
                </div>
                <div>
                    <input type="email" placeholder="Return Vector (Email)" required class="w-full bg-transparent border-b border-gray-200 py-4 text-xl focus:outline-none focus:border-gray-900 transition-colors placeholder-gray-300 text-gray-900 rounded-none">
                </div>
                <div>
                    <textarea placeholder="Payload Data" rows="1" required class="w-full bg-transparent border-b border-gray-200 py-4 text-xl focus:outline-none focus:border-gray-900 transition-colors placeholder-gray-300 text-gray-900 resize-none rounded-none"></textarea>
                </div>
                <button type="submit" class="text-xs uppercase tracking-widest font-semibold border-b-2 border-transparent hover:border-gray-900 transition-colors pb-1 mt-8">Transmit Data</button>
            </form>
        </div>
    </main>

</body>
</html>
